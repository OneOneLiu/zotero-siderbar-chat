<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<window xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        title="AI Multi-paper Analysis"
        width="900" height="700">
  <html:iframe id="analysis-frame"
    style="width: 100%; height: 100%; border: none; background: #f5f5f7;"
    flex="1" />
  <script type="application/javascript"><![CDATA[
    window.addEventListener("load", function() {
      // Grab Zotero, IOUtils, and PathUtils from the opener (main Zotero window)
      if (window.opener) {
        window.Zotero = window.opener.Zotero;
        window.IOUtils = window.opener.IOUtils;
        window.PathUtils = window.opener.PathUtils;
      }

      var params = "";
      if (window.arguments && window.arguments[0]) {
        params = "?data=" + window.arguments[0];
      }
      var frame = document.getElementById("analysis-frame");
      frame.setAttribute("src", "chrome://GeminiChat/content/analysis.html" + params);
    });
  ]]></script>
</window>
