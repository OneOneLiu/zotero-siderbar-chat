<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Gemini Chat Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Arial, sans-serif;
      padding: 12px;
      margin: 0;
      color: #111;
      background-color: #f3f4f6;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    input,
    select {
      padding: 8px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      background-color: #fff;
    }

    input:focus,
    select:focus {
      border-color: #0969da;
      outline: none;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.3);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      padding: 6px 14px;
      border: 1px solid rgba(27, 31, 36, 0.15);
      border-radius: 6px;
      cursor: pointer;
      background-color: #f6f8fa;
      color: #24292f;
      font-weight: 500;
      font-size: 13px;
      transition: 0.2s;
    }

    button:hover {
      background-color: #f3f4f6;
      border-color: rgba(27, 31, 36, 0.15);
    }

    #test-status {
      font-size: 12px;
      flex: 1;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="field">
    <label for="api-base">Gemini API base URL</label>
    <input id="api-base" type="text" placeholder="https://generativelanguage.googleapis.com/v1beta" />
  </div>
  <div class="field">
    <label for="model">Model</label>
    <select id="model">
      <!-- Populated by prefs.js -->
    </select>
  </div>
  <div class="field">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="Your API key" />
  </div>
  <div class="field">
    <label>Custom Prompts</label>
    <div id="prompts-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px;">
      <!-- Prompts will be rendered here -->
    </div>

    <div style="display: flex; gap: 8px; align-items: flex-start;">
      <input id="new-prompt-name" type="text" placeholder="Name (e.g. Summarize)" style="width: 120px;" />
      <input id="new-prompt-text" type="text" placeholder="Prompt content..." style="flex: 1;" />
      <button id="add-prompt-btn" type="button" style="padding: 8px 12px;">Add</button>
      <button id="cancel-edit-btn" type="button" style="padding: 8px 12px; display: none;">Cancel</button>
    </div>
    <!-- Hidden input to store the actual JSON -->
    <input id="custom-prompts" type="hidden" />
  </div>
  <div class="actions">
    <button id="test-btn" type="button">Test Gemini</button>
    <div id="test-status"></div>
  </div>

  <script src="scripts/prefs.js"></script>
</body>

</html>
