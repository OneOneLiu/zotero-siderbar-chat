<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Multi-paper Analysis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* --- Left sidebar --- */
    .sidebar {
      width: 260px;
      min-width: 200px;
      background: white;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px;
      font-size: 14px;
      font-weight: 700;
      color: #1d1d1f;
      border-bottom: 1px solid #e5e5e5;
    }
    .paper-check-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .paper-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      user-select: none;
    }
    .paper-check-item:hover { background: #f0f5ff; }
    .paper-check-item.selected {
      background: #e8f0fe;
      border-color: #007AFF;
    }
    .paper-check-dot {
      width: 8px;
      height: 8px;
      min-width: 8px;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .paper-check-item.selected .paper-check-dot {
      background: #007AFF;
    }
    .rag-status-dot {
      width: 6px;
      height: 6px;
      min-width: 6px;
      border-radius: 50%;
      background: #d1d5db;
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .paper-check-label {
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }
    .sidebar-hint {
      padding: 10px 12px;
      font-size: 11px;
      color: #86868b;
      border-top: 1px solid #e5e5e5;
      background: #fafafa;
    }

    /* --- Main chat area --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 90%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #007AFF;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.model {
      align-self: flex-start;
      background: white;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #86868b;
      font-size: 12px;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 6px 12px;
    }
    .msg h1, .msg h2, .msg h3 { color: #1d1d1f; }
    .msg h2 { font-size: 15px; margin: 14px 0 6px 0; padding-bottom: 3px; border-bottom: 1px solid #e5e5e5; }
    .msg h3 { font-size: 14px; margin: 10px 0 4px 0; }
    .msg p { margin: 0 0 8px 0; }
    .msg p:last-child { margin: 0; }
    .msg table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
    .msg th, .msg td { border: 1px solid #e5e5e5; padding: 5px 8px; text-align: left; }
    .msg th { background: #f9f9fb; font-weight: 600; }
    .msg pre { background: #1f2937; color: #e5e7eb; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 12px; }
    .msg code { font-family: "Consolas", "Monaco", monospace; background: #f3f4f6; padding: 1px 4px; border-radius: 4px; font-size: 12px; }
    .msg pre code { background: transparent; color: inherit; }
    .msg ul, .msg ol { margin: 6px 0; padding-left: 20px; }
    .msg li { margin-bottom: 3px; }
    .msg details { margin: 8px 0; }
    .msg summary { cursor: pointer; font-weight: 600; color: #007AFF; padding: 6px 0; }
    .msg hr { border: none; border-top: 1px solid #e5e5e5; margin: 12px 0; }
    .msg strong { font-weight: 600; }

    /* --- Input area --- */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e5e5;
      background: white;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: #007AFF;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }
    .btn-send {
      padding: 8px 20px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-send:hover { opacity: 0.9; }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-hint {
      font-size: 11px;
      color: #86868b;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">📊 Context Papers</div>
    <div id="paper-check-list" class="paper-check-list"></div>
    <div class="sidebar-hint">Checked papers will have their full text included as context for follow-up questions.</div>
  </div>
  <div class="main">
    <div id="chat-messages" class="chat-messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="chat-input" class="chat-input" rows="1" placeholder="Ask a question about the selected papers..."></textarea>
        <button id="btn-send" class="btn-send">Send</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line · First message triggers full analysis</div>
    </div>
  </div>
  <script src="chrome://GeminiChat/content/scripts/analysis.js"></script>
</body>
</html>
